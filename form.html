<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessel Fitness · Contact Form</title>
    
    <style>
        /* FORM CSS STYLES */
        
        body {
            background: linear-gradient(135deg, #faebd7 0%, #f5e6d3 100%);
            font-family: 'Poppins', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .form-container {
            max-width: 550px;
            width: 100%;
        }
        
        form {
            background-color: #faf9f6;
            color: #2f4f4f;
            font-family: 'Poppins', 'Arial', sans-serif;
            border: 2px solid #2f4f4f;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        
        /* Form Heading */
        .form-heading {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .form-heading h3 {
            color: #2f4f4f;
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .form-heading p {
            color: #2f4f4f;
            font-size: 0.9rem;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2f4f4f;
        }
        
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', 'Arial', sans-serif;
            font-size: 1rem;
            background-color: white;
            color: #2f4f4f;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff7f50;
        }
        
        /* PRIMARY CTA BUTTON */
        .btn-primary {
            background-color: #2f4f4f;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', 'Arial', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: #ff7f50;
            transform: translateY(-2px);
        }
        
        /* SECONDARY CTA SECTION */
        .secondary-cta {
            background-color: white;
            border: 2px solid #ff7f50;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        
        .secondary-cta h3 {
            color: #2f4f4f;
            font-family: 'Poppins', 'Arial', sans-serif;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        
        .secondary-cta p {
            color: #2f4f4f;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        /* SECONDARY CTA BUTTON */
        .btn-secondary {
            background-color: transparent;
            color: #ff7f50;
            border: 2px solid #ff7f50;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', 'Arial', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: #ff7f50;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <!-- PRIMARY FORM WITH PRIMARY CTA -->
        <form action="https://formspree.io/f/mdapbpqd" method="POST">
            
            <!-- "Any questions? Contact us" heading -->
            <div class="form-heading">
                <h3>Any questions? Contact us</h3>
                <p>We're here to help you on your fitness journey</p>
            </div>
            
            <label for="email">Your email</label>
            <input type="email" id="email" name="email" required>
            
            <label for="message">Your message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            
            <button type="submit" class="btn-primary">Send Message →</button>
            
        </form>

        <!-- SECONDARY CTA SECTION -->
        <div class="secondary-cta">
            <h3>⚡ Not ready to message yet?</h3>
            <p>Get weekly fitness tips and early access updates</p>
            <button class="btn-secondary">Subscribe to Newsletter →</button>
        </div>
    </div>

</body>
</html>
